name: WORKFLOW

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventario_equipos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Clonar el código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pgsql

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress

      - name: Copiar archivo .env
        run: cp .env.example .env

      - name: Generar clave de la aplicación
        run: php artisan key:generate

      - name: Ejecutar migraciones
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: inventario_equipos_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Ejecutar pruebas
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: inventario_equipos_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres